spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: true
        format_sql: true
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false
  shell:
    interactive:
      enabled: false
logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: warn
smartos:
  bootstrap:
    enabled: true

